name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: job_scheduler_test
          MYSQL_USER: scheduler
          MYSQL_PASSWORD: scheduler123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for speed)
        run: mvn clean package -DskipTests -B

      - name: Run tests
        run: mvn test -B
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: scheduler
          DB_PASSWORD: scheduler123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          APP_INSTANCE_ID: ci-instance

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-jar
          path: target/distributed-job-scheduler-*.jar
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t job-scheduler:ci .

      - name: Verify image was created
        run: docker images job-scheduler:ci
